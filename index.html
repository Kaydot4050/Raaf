<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Raafortagro — quality poultry, livestock, and farm supplies in Ghana." />
    <title>Raafortagro</title>
    <link rel="icon" type="image/png" href="/images/cropped-cropped-gooo-1-1.png?v=2" />
    <link rel="shortcut icon" href="/images/cropped-cropped-gooo-1-1.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:9999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        d.innerHTML = '<b>Error:</b> ' + msg + '<br><b>At:</b> ' + url + ':' + lineNo + ':' + columnNo + '<br><b>Stack:</b> ' + (error ? error.stack : '');
        document.body.appendChild(d);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:darkred;color:white;z-index:9999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        d.innerHTML = '<b>Unhandled Promise Rejection:</b> ' + (event.reason ? event.reason.stack || event.reason : 'Unknown reason');
        document.body.appendChild(d);
      });
    </script>
    <div id="root"></div>
    <script>
      // Polyfill crypto.randomUUID for non-secure contexts (HTTP over network IPs).
      // Must run BEFORE any ES module code so Neon Auth adapter-core can use it.
      try {
        if (!window.crypto) window.crypto = {};
        if (typeof window.crypto.randomUUID !== 'function') {
          window.crypto.randomUUID = function () {
            var b = new Uint8Array(16);
            if (typeof window.crypto.getRandomValues === 'function') {
              window.crypto.getRandomValues(b);
            } else {
              for (var i = 0; i < 16; i++) b[i] = (Math.random() * 256) | 0;
            }
            b[6] = (b[6] & 0x0f) | 0x40;
            b[8] = (b[8] & 0x3f) | 0x80;
            var h = '';
            for (var j = 0; j < 16; j++) h += b[j].toString(16).padStart(2, '0');
            return h.slice(0,8)+'-'+h.slice(8,12)+'-'+h.slice(12,16)+'-'+h.slice(16,20)+'-'+h.slice(20);
          };
        }
      } catch(e) {}
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
